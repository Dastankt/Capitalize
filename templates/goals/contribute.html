{% extends 'base.html' %}
{% block title %}Пополнить цель{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="mb-1"><i class="bi bi-piggy-bank"></i> {{ goal.title }}</h4>
            <p class="text-muted mb-3">
                Накоплено: {{ goal.current_amount }} / {{ goal.target_amount }} сом
            </p>
            <div class="progress mb-4" style="height: 10px;">
                <div class="progress-bar bg-purple"
                     style="width: {{ goal.progress_percent }}%; background-color: #7c6af7;">
                </div>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">{{ form.amount.label }}</label>
                    {{ form.amount }}
                </div>
                <p class="small text-muted">
                    Доступно на балансе: {{ request.user.profile.balance }} сом
                </p>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-plus-lg"></i> Пополнить
                    </button>
                    <a href="{% url 'goal_list' %}" class="btn btn-outline-secondary w-100">
                        Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
