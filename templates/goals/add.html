{% extends 'base.html' %}
{% block title %}Новая цель — Capitalize{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="d-flex align-items-center gap-3 mb-4">
            <a href="{% url 'goal_list' %}"
               class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div>
                <h5 class="fw-700 ls-tight mb-0">Новая цель</h5>
                <p style="color:var(--text-3);font-size:0.8rem;margin:0;">Поставь цель и начни копить</p>
            </div>
        </div>

        <div class="card p-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <div class="mt-1" style="color:var(--red);font-size:0.8rem;">
                            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
                        </div>
                    {% endfor %}
                </div>
                {% endfor %}

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-trophy me-1"></i>Создать цель
                    </button>
                    <a href="{% url 'goal_list' %}"
                       class="btn btn-outline-secondary w-100">
                        Отмена
                    </a>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
